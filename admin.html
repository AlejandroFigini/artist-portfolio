<!DOCTYPE html>
<html lang="es" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión — Lucia Montaña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;700;800&family=Raleway:wght@100;200;300;400;500;600&family=Fira+Code:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2.5">
    <script>
        // Aplicar tema guardado para coherencia visual
        if (localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    </script>
</head>

<body class="admin-page">
    <header class="admin-topbar">
        <a href="index.html" class="logo">Lucia Montaña <span class="highlight">| Gestión</span></a>
        <div class="admin-topbar-right">
            <span class="cms-user-chip" id="admin-user-chip"><i class="fa-solid fa-user-shield"></i> superadmin</span>
            <a href="index.html" class="cms-btn cms-btn--sm"><i class="fa-solid fa-arrow-left"></i> Volver al sitio</a>
        </div>
    </header>

    <div class="admin-shell">
        <!-- Apartado de opciones: despliega las secciones de gestión -->
        <aside class="admin-sidebar">
            <nav class="admin-nav" id="admin-nav">
                <button type="button" class="admin-nav-item active" data-section="resumen">
                    <i class="fa-solid fa-gauge-high"></i><span>Resumen</span>
                </button>
                <div class="admin-nav-group">
                    <button type="button" class="admin-nav-item" id="nav-btn-contenidos" data-section="group-contenidos">
                        <i class="fa-solid fa-photo-film"></i><span>Contenidos <i class="fa-solid fa-chevron-down" style="font-size:0.7em; margin-left:auto; width:auto;"></i></span>
                    </button>
                    <div class="admin-nav-sub" id="nav-sub-contenidos">
                        <button type="button" class="admin-nav-item" data-section="contenidos-usado">
                            <i class="fa-solid fa-check c-uso"></i><span id="nav-badge-usado" class="admin-nav-badge-label">En uso</span>
                        </button>
                        <button type="button" class="admin-nav-item" data-section="contenidos-nousado">
                            <i class="fa-solid fa-folder-closed c-nouso"></i><span id="nav-badge-nousado" class="admin-nav-badge-label">Sin usar</span>
                        </button>
                        <button type="button" class="admin-nav-item" data-section="contenidos-basurero">
                            <i class="fa-solid fa-trash-can c-basurero"></i><span id="nav-badge-basurero" class="admin-nav-badge-label">Basurero</span>
                        </button>
                        <button type="button" class="admin-nav-item" data-section="contenidos-repo">
                            <i class="fa-solid fa-cloud c-repo"></i><span id="nav-badge-repo" class="admin-nav-badge-label">Repositorio</span>
                        </button>
                        <button type="button" class="admin-nav-item" data-section="subircontenido">
                            <i class="fa-solid fa-vial c-subir"></i><span>Subir contenido</span>
                        </button>
                    </div>
                </div>
                <button type="button" class="admin-nav-item" data-section="usuarios">
                    <i class="fa-solid fa-users-gear"></i><span>Usuarios</span>
                </button>
                <button type="button" class="admin-nav-item" data-section="auditoria">
                    <i class="fa-solid fa-clipboard-list"></i><span>Auditoría</span>
                </button>
                <button type="button" class="admin-nav-item" data-section="ajustes">
                    <i class="fa-solid fa-sliders"></i><span>Ajustes del sitio</span>
                </button>
            </nav>
        </aside>

        <main id="admin-root" class="admin-root"></main>
    </div>

    <script src="admin.js?v=2.8"></script>
</body>

</html>
